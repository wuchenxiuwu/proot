name: Build Proot ARM64 Static with musl

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install musl cross toolchain
      run: |
        sudo apt update
        sudo apt install -y make wget
        # 下载 musl 交叉编译工具链
        wget https://musl.cc/aarch64-linux-musl-cross.tgz
        tar xf aarch64-linux-musl-cross.tgz
        echo "$PWD/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH

    - name: Download uthash.h
      run: |
        wget https://raw.githubusercontent.com/troydhanson/uthash/master/src/uthash.h
        cp uthash.h ./aarch64-linux-musl-cross/aarch64-linux-musl/include/

    - name: Build talloc static library
      run: |
        wget https://www.samba.org/ftp/talloc/talloc-2.4.1.tar.gz
        tar xf talloc-2.4.1.tar.gz
        cd talloc-2.4.1
        CC=aarch64-linux-musl-gcc AR=aarch64-linux-musl-ar \
        ./configure --prefix=$PWD/install --host=aarch64-linux-musl \
                    --disable-python
        make
        make install
        cd ..

    - name: Build Proot (ARM64 static)
      run: |
        make clean
        make CC=aarch64-linux-musl-gcc \
             AR=aarch64-linux-musl-ar \
             CFLAGS="-I$PWD/talloc-2.4.1/install/include -I./aarch64-linux-musl-cross/aarch64-linux-musl/include" \
             LDFLAGS="-static -L$PWD/talloc-2.4.1/install/lib" \
             LDLIBS="-ltalloc"

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: proot-arm64-static-musl
        path: proot
