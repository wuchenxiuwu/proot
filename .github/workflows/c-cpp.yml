name: Build Proot ARM64 Static (Debian)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm

    steps:
    - name: Install dependencies
      run: |
        apt update
        apt install -y wget make git crossbuild-essential-arm64 python3

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download uthash.h
      run: |
        wget https://raw.githubusercontent.com/troydhanson/uthash/master/src/uthash.h
        cp uthash.h /usr/aarch64-linux-gnu/include/

    - name: Build talloc static library
      run: |
        wget https://www.samba.org/ftp/talloc/talloc-2.4.1.tar.gz
        tar xf talloc-2.4.1.tar.gz
        cd talloc-2.4.1
        CC=aarch64-linux-gnu-gcc AR=aarch64-linux-gnu-ar \
        ./configure --prefix=$PWD/install --host=aarch64-linux-gnu \
                    --disable-python
        make
        make install
        cd ..

    - name: Build Proot (ARM64 static)
      run: |
        make clean
        make CC=aarch64-linux-gnu-gcc \
             AR=aarch64-linux-gnu-ar \
             CFLAGS="-I$PWD/talloc-2.4.1/install/include -I/usr/aarch64-linux-gnu/include" \
             LDFLAGS="-static -L$PWD/talloc-2.4.1/install/lib -L/usr/aarch64-linux-gnu/lib" \
             LDLIBS="-ltalloc"

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: proot-arm64-static
        path: proot