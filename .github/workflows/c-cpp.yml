name: Build Proot ARM64 Static (Debian - Manual)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm

    steps:
    - name: Install dependencies
      run: |
        apt update
        apt install -y wget make git crossbuild-essential-arm64 python3 libc6-dev-arm64-cross

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download uthash.h
      run: |
        wget https://raw.githubusercontent.com/troydhanson/uthash/master/src/uthash.h
        cp uthash.h /usr/aarch64-linux-gnu/include/

    - name: Manual build talloc static library
      run: |
        wget https://www.samba.org/ftp/talloc/talloc-2.4.1.tar.gz
        tar xf talloc-2.4.1.tar.gz
        cd talloc-2.4.1
        # 直接编译所有 .c 文件，不运行 configure
        aarch64-linux-gnu-gcc --sysroot=/usr/aarch64-linux-gnu -c talloc.c -o talloc.o
        aarch64-linux-gnu-ar rcs libtalloc.a talloc.o
        mkdir -p install/lib install/include
        cp libtalloc.a install/lib/
        cp talloc.h install/include/
        cd ..

    - name: Build Proot (ARM64 static)
      run: |
        make clean
        make CC=aarch64-linux-gnu-gcc \
             AR=aarch64-linux-gnu-ar \
             CFLAGS="--sysroot=/usr/aarch64-linux-gnu -I$PWD/talloc-2.4.1/install/include -I/usr/aarch64-linux-gnu/include" \
             LDFLAGS="--sysroot=/usr/aarch64-linux-gnu -static -L$PWD/talloc-2.4.1/install/lib -L/usr/aarch64-linux-gnu/lib" \
             LDLIBS="-ltalloc"

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: proot-arm64-static
        path: proot