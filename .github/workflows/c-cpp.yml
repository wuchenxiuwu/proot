name: Build Proot ARM64 Static (The Real Deal)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm

    steps:
      - name: Install essential tools
        run: |
          apt update
          apt install -y wget make git python3 crossbuild-essential-arm64

      - name: Checkout proot source
        uses: actions/checkout@v4

      - name: Set environment variables for cross-compilation
        run: |
          echo "SYSROOT=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "AR=aarch64-linux-gnu-ar" >> $GITHUB_ENV
          echo "CFLAGS_BASE=--sysroot=$SYSROOT -I$SYSROOT/include" >> $GITHUB_ENV
          echo "LDFLAGS_BASE=--sysroot=$SYSROOT -L$SYSROOT/lib" >> $GITHUB_ENV

      - name: Download and install uthash.h
        run: |
          wget https://raw.githubusercontent.com/troydhanson/uthash/master/src/uthash.h
          mkdir -p $SYSROOT/include
          cp uthash.h $SYSROOT/include/

      - name: Download talloc source
        run: |
          wget https://www.samba.org/ftp/talloc/talloc-2.4.1.tar.gz
          tar xf talloc-2.4.1.tar.gz

      - name: Create cross-answers.txt for talloc
        run: |
          cd talloc-2.4.1
          cat > cross-answers.txt << 'EOF'
          Checking uname sysname type: "Linux"
          Checking uname machine type: "aarch64"
          Checking uname release type: "5.10.0"
          Checking uname version type: "#1 SMP"
          Checking simple C program: OK
          Checking for large file support without additional flags: OK
          Checking for -D_FILE_OFFSET_BITS=64: OK
          Checking for -D_LARGE_FILES: OK
          Checking correct behavior of strtoll: OK
          Checking for working strptime: OK
          Checking for C99 vsnprintf: OK
          Checking for HAVE_SHARED_MMAP: OK
          Checking for HAVE_MREMAP: OK
          Checking for HAVE_INCOHERENT_MMAP: NO
          Checking for getconf LFS_CFLAGS: OK
          Checking for getconf LFS_LDFLAGS: OK
          Checking for getconf LFS_LIBS: OK
          rpath library support: OK
          -Wl,--version-script support: OK
          EOF
          cd ..

      - name: Configure and build talloc static library using waf
        run: |
          cd talloc-2.4.1
          # 使用 waf 配置交叉编译
          CC=$CC CFLAGS="$CFLAGS_BASE" LDFLAGS="$LDFLAGS_BASE" \
          python3 buildtools/bin/waf configure \
            --prefix=$PWD/install \
            --host=aarch64-linux-gnu \
            --cross-compile \
            --cross-answers=$PWD/cross-answers.txt \
            --disable-python
          # 编译
          python3 buildtools/bin/waf build
          # 安装到临时目录
          python3 buildtools/bin/waf install
          cd ..

      - name: Build proot static
        run: |
          make clean
          make CC=$CC AR=$AR \
               CFLAGS="$CFLAGS_BASE -I$PWD/talloc-2.4.1/install/include" \
               LDFLAGS="$LDFLAGS_BASE -static -L$PWD/talloc-2.4.1/install/lib" \
               LDLIBS="-ltalloc"

      - name: Verify binary
        run: |
          file proot
          ldd proot && echo "动态链接" || echo "静态链接成功"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-arm64-static
          path: proot