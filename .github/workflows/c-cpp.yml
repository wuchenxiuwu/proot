name: Build Proot ARM64 Static

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install cross-compiler and tools
      run: |
        sudo apt update
        sudo apt install -y gcc-aarch64-linux-gnu make wget
        
    - name: Download uthash.h (header-only library)
      run: |
        wget https://raw.githubusercontent.com/troydhanson/uthash/master/src/uthash.h
        sudo cp uthash.h /usr/local/include/
        
    - name: Build talloc static library for ARM64
      run: |
        wget https://www.samba.org/ftp/talloc/talloc-2.4.1.tar.gz
        tar xf talloc-2.4.1.tar.gz
        cd talloc-2.4.1
        CC=aarch64-linux-gnu-gcc ./configure --prefix=$PWD/install --host=aarch64-linux-gnu --disable-python
        make
        make install
        cd ..
        
    - name: Build Proot (ARM64 static)
      run: |
        make clean
        make CC=aarch64-linux-gnu-gcc \
             AR=aarch64-linux-gnu-ar \
             CFLAGS="-I$PWD/talloc-2.4.1/install/include -I/usr/local/include" \
             LDFLAGS="-static -L$PWD/talloc-2.4.1/install/lib" \
             LDLIBS="-ltalloc"
        
    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: proot-arm64-static
        path: proot
