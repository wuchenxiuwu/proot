name: Build Proot ARM64 (The Real Way)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm

    steps:
      - name: Install essential tools
        run: |
          apt update
          apt install -y wget make git python3 crossbuild-essential-arm64

      - name: Checkout proot source
        run: |
          git clone --recursive https://github.com/termux/proot.git
          cd proot

      - name: Set environment variables for cross-compilation
        run: |
          echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "AR=aarch64-linux-gnu-ar" >> $GITHUB_ENV

      - name: Install uthash.h
        run: |
          wget https://raw.githubusercontent.com/troydhanson/uthash/master/src/uthash.h
          cp uthash.h /usr/aarch64-linux-gnu/include/

      - name: Build loader
        run: |
          cd proot
          make CC=$CC AR=$AR loader

      - name: Build proot
        run: |
          cd proot
          make CC=$CC AR=$AR proot

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: proot-arm64
          path: proot/proot